<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dew Playground</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
header { background: #16213e; padding: 10px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #0f3460; }
header h1 { font-size: 18px; color: #e94560; }
header span { font-size: 12px; color: #8892b0; }
.toolbar { display: flex; gap: 8px; margin-left: auto; }
.btn { padding: 6px 16px; border: 1px solid #0f3460; background: #16213e; color: #e0e0e0; border-radius: 4px; cursor: pointer; font: inherit; font-size: 13px; }
.btn:hover { background: #0f3460; }
.btn.primary { background: #e94560; border-color: #e94560; color: #fff; font-weight: bold; }
.btn.primary:hover { background: #c73a50; }
.main { display: flex; flex: 1; overflow: hidden; }
.editor-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #0f3460; }
.editor-pane label { padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8892b0; background: #16213e; }
#editor { flex: 1; background: #1a1a2e; color: #e0e0e0; border: none; padding: 15px; font: 14px/1.6 'SF Mono', 'Fira Code', 'Consolas', monospace; resize: none; outline: none; tab-size: 2; }
#editor:focus { background: #1e1e36; }
.output-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.tabs { display: flex; background: #16213e; }
.tab { padding: 8px 16px; border: none; background: none; color: #8892b0; cursor: pointer; font: inherit; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid transparent; }
.tab.active { color: #e94560; border-bottom-color: #e94560; }
.tab-content { flex: 1; overflow: auto; padding: 15px; display: none; font-size: 13px; line-height: 1.5; }
.tab-content.active { display: block; }
.tab-content pre { white-space: pre-wrap; word-break: break-all; }
.result-line { font-size: 24px; color: #4ecca3; padding: 10px 0; font-weight: bold; }
.error-line { color: #e94560; padding: 8px 0; }
.warn-line { color: #f0a500; }
.ir-block { color: #8892b0; }
.key { color: #e94560; }
.string { color: #4ecca3; }
.number { color: #f0a500; }
/* Autocomplete dropdown */
.editor-wrapper { position: relative; flex: 1; display: flex; flex-direction: column; }
.ac-dropdown { position: absolute; z-index: 1000; background: #16213e; border: 1px solid #0f3460; border-radius: 4px; max-height: 200px; overflow-y: auto; min-width: 200px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); display: none; }
.ac-dropdown.visible { display: block; }
.ac-item { padding: 6px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: baseline; gap: 12px; font-size: 13px; }
.ac-item.selected { background: #0f3460; }
.ac-item:hover { background: #1a1a3e; }
.ac-label { color: #e0e0e0; }
.ac-kind { font-size: 10px; padding: 1px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.ac-kind.keyword { background: #e94560; color: #fff; }
.ac-kind.type { background: #4ecca3; color: #111; }
.ac-kind.variable { background: #f0a500; color: #111; }
.ac-detail { font-size: 11px; color: #8892b0; margin-left: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
@media (max-width: 768px) { .main { flex-direction: column; } }
</style>
</head>
<body>
<header>
  <h1>Dew Playground</h1>
  <span>Affine Types · Implicit Laziness · FP</span>
  <div class="toolbar">
    <button class="btn" onclick="insertSample('fib')">Fibonacci</button>
    <button class="btn" onclick="insertSample('list')">List Ops</button>
    <button class="btn" onclick="insertSample('box')">Box Demo</button>
    <button class="btn" onclick="insertSample('prime')">Lazy Stream</button>
    <button class="btn" onclick="insertSample('comment')">Comments</button>
    <button class="btn primary" onclick="runCode()">▶ Run</button>
  </div>
</header>
<div class="main">
  <div class="editor-pane">
    <label>Source (.dew)</label>
    <div class="editor-wrapper">
      <textarea id="editor" spellcheck="false" placeholder="Write Dew code here...">def main = fn () {
  42
}</textarea>
      <div id="ac-dropdown" class="ac-dropdown"></div>
    </div>
  </div>
  <div class="output-pane">
    <div class="tabs">
      <button class="tab active" onclick="showTab('result')">Result</button>
      <button class="tab" onclick="showTab('ir-text')">IR (text)</button>
      <button class="tab" onclick="showTab('ir-json')">IR (json)</button>
      <button class="tab" onclick="showTab('flat-ir')">Flat IR</button>
      <button class="tab" onclick="showTab('diagnostics')">Diagnostics</button>
    </div>
    <div id="tab-result" class="tab-content active"></div>
    <div id="tab-ir-text" class="tab-content"></div>
    <div id="tab-ir-json" class="tab-content"></div>
    <div id="tab-flat-ir" class="tab-content"></div>
    <div id="tab-diagnostics" class="tab-content"></div>
  </div>
</div>
<script>
const SAMPLES = {
  fib: `# Infinite Fibonacci sequence via lazy cons
def fibs = fix f: List(Int) -> List(Int) {
    fn (prev: List(Int)) {
        def a = head(prev);
        def b = head(tail(prev));
        def next_pair = cons(b, cons(a + b, nil));
        cons(a, f(next_pair))
    }
};
def start = cons(0, cons(1, nil));
def stream = fibs(start);
def f0 = head(stream);
def t1 = tail(stream);
def f1 = head(t1);
def t2 = tail(t1);
def f2 = head(t2);
def t3 = tail(t2);
def f3 = head(t3);
def t4 = tail(t3);
def f4 = head(t4);
def main = fn () {
    f0 + f1 + f2 + f3 + f4
}`,
  list: `# List operations
def main = fn () {
    def xs = cons(10, cons(20, cons(30, nil)));
    head(xs) + head(tail(tail(xs)))
}`,
  box: `# Box (affine resource) demo
def main = fn () {
    def b = box(42);
    def val = unbox(b);
    val
}`,
  prime: `// Lazy infinite stream — demonstrates fix + cons
def from = fix f: Int -> List(Int) {
    fn (n: Int) { cons(n, f(n + 1)) }
};
def stream = from(100);
def main = fn () { head(stream) }`,

  comment: `/// Documentation comment (triple-slash)
// Computes factorial recursively using fix
def fact = fix f: Int -> Int {
    fn (n: Int) {
        if (n < 2) { 1 }
        else { n * f(n - 1) } // recursive call
    }
};

def main = fn () {
    fact(5)  # also supports # style comments
}`
};

function insertSample(name) {
    if (SAMPLES[name]) {
        document.getElementById('editor').value = SAMPLES[name];
    }
}

function showTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelector(`[onclick="showTab('${name}')"]`).classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
}

async function runCode() {
    const source = document.getElementById('editor').value;
    const resultEl = document.getElementById('tab-result');

    resultEl.innerHTML = '<span style="color:#8892b0">Running...</span>';
    showTab('result');

    try {
        const resp = await fetch('/api/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ source })
        });
        const data = await resp.json();

        if (data.success) {
            resultEl.innerHTML = `<div class="result-line">Result: ${data.result ?? '(unit)'}</div>`;
        } else {
            resultEl.innerHTML = `<div class="error-line">${data.error_code ? '[' + data.error_code + '] ' : ''}${data.error || 'Unknown error'}</div>`;
        }

        if (data.ir_text) {
            document.getElementById('tab-ir-text').innerHTML = '<pre class="ir-block">' + escapeHtml(data.ir_text) + '</pre>';
        }
        if (data.ir_json) {
            document.getElementById('tab-ir-json').innerHTML = '<pre class="ir-block">' + escapeHtml(JSON.stringify(data.ir_json, null, 2)) + '</pre>';
        }
        if (data.flat_ir) {
            document.getElementById('tab-flat-ir').innerHTML = '<pre class="ir-block">' + escapeHtml(data.flat_ir) + '</pre>';
        }
        if (data.diagnostics) {
            const diag = data.diagnostics;
            let html = '';
            if (diag.affine) {
                if (diag.affine.violations && diag.affine.violations.length > 0) {
                    html += '<div class="error-line">Affine Violations:</div>';
                    diag.affine.violations.forEach(v => { html += `<div class="error-line">  ${v.var}: ${v.reason}</div>`; });
                }
                if (diag.affine.leaks && diag.affine.leaks.length > 0) {
                    html += '<div class="warn-line">Resource Leaks (W001):</div>';
                    diag.affine.leaks.forEach(l => { html += `<div class="warn-line">  ${l.var}: ${l.reason}</div>`; });
                }
            }
            if (diag.thunks) {
                html += '<div class="ir-block">Thunks: ' + diag.thunks.total_created + ' created, ' + diag.thunks.total_forced + ' forced';
                if (diag.thunks.never_forced && diag.thunks.never_forced.length > 0) {
                    html += ', <span class="warn-line">' + diag.thunks.never_forced.length + ' never forced</span>';
                }
                html += '</div>';
            }
            if (diag.closures && diag.closures.classes && diag.closures.classes.length > 0) {
                html += '<div class="ir-block">Closures:</div>';
                diag.closures.classes.forEach(c => {
                    html += `<div class="ir-block">  ${c.param}: ${c.affinity}`;
                    if (c.affine_captures && c.affine_captures.length > 0) {
                        html += ' (captures: ' + c.affine_captures.join(', ') + ')';
                    }
                    html += '</div>';
                });
            }
            document.getElementById('tab-diagnostics').innerHTML = html;
        }
    } catch (e) {
        resultEl.innerHTML = '<div class="error-line">Network error: ' + escapeHtml(e.message) + '</div>';
    }
}

function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Ctrl+Enter to run
document.getElementById('editor').addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runCode();
        return;
    }
    handleAcKeydown(e);
});

// ── Autocomplete ──────────────────────────────────────────────────────

const DEW_KEYWORDS = [
    { label: 'fn', kind: 'keyword', detail: 'Lambda/function', insert: 'fn ($1) { $2 }' },
    { label: 'def', kind: 'keyword', detail: 'Binding', insert: 'def $1 = $2; $3' },
    { label: 'if', kind: 'keyword', detail: 'Conditional', insert: 'if $1 { $2 } else { $3 }' },
    { label: 'else', kind: 'keyword', detail: 'Else branch', insert: 'else' },
    { label: 'fix', kind: 'keyword', detail: 'Recursion', insert: 'fix $1: $2 { $3 }' },
    { label: 'dup', kind: 'keyword', detail: 'Duplicate', insert: 'dup($1)' },
    { label: 'box', kind: 'keyword', detail: 'Allocate Box', insert: 'box($1)' },
    { label: 'unbox', kind: 'keyword', detail: 'Deallocate Box', insert: 'unbox($1)' },
    { label: 'nil', kind: 'keyword', detail: 'Empty list', insert: 'nil' },
    { label: 'cons', kind: 'keyword', detail: 'List constructor', insert: 'cons($1, $2)' },
    { label: 'head', kind: 'keyword', detail: 'List head', insert: 'head($1)' },
    { label: 'tail', kind: 'keyword', detail: 'List tail', insert: 'tail($1)' },
    { label: 'isnil', kind: 'keyword', detail: 'Is list empty?', insert: 'isnil($1)' },
    { label: 'true', kind: 'keyword', detail: 'Bool true', insert: 'true' },
    { label: 'false', kind: 'keyword', detail: 'Bool false', insert: 'false' },
];

const DEW_TYPES = [
    { label: 'Int', kind: 'type', detail: '64-bit integer', insert: 'Int' },
    { label: 'Bool', kind: 'type', detail: 'Boolean', insert: 'Bool' },
    { label: '()', kind: 'type', detail: 'Unit/void', insert: '()' },
    { label: 'Box(', kind: 'type', detail: 'Linear box', insert: 'Box($1)' },
    { label: 'List(', kind: 'type', detail: 'List type', insert: 'List($1)' },
];

const acDropdown = document.getElementById('ac-dropdown');
const editor = document.getElementById('editor');
let acItems = [];
let acSelected = -1;
let acVisible = false;
let acPrefix = '';
let acDebounceTimer = null;

function getCursorWord() {
    const ta = editor;
    const pos = ta.selectionStart;
    const text = ta.value;
    // Walk backward to find start of current word
    let start = pos;
    while (start > 0 && /[a-zA-Z0-9_]/.test(text[start - 1])) start--;
    return { prefix: text.substring(start, pos), start: start, end: pos };
}

function getCursorPosition() {
    const ta = editor;
    const text = ta.value;
    const pos = ta.selectionStart;
    const before = text.substring(0, pos);
    const lines = before.split('\n');
    return { line: lines.length, column: lines[lines.length - 1].length };
}

function collectClientNames(text) {
    const names = new Set();
    // Match def/fix/fn param names
    const defRe = /\bdef\s+(\w+)/g;
    const fixRe = /\bfix\s+(\w+)/g;
    const paramRe = /\bfn\s*\(\s*(\w+)\s*:/g;
    let m;
    while ((m = defRe.exec(text)) !== null) names.add(m[1]);
    while ((m = fixRe.exec(text)) !== null) names.add(m[1]);
    while ((m = paramRe.exec(text)) !== null) names.add(m[1]);
    return names;
}

function isInTypePosition(text, pos) {
    const before = text.substring(0, pos);
    return before.trimEnd().endsWith(':');
}

function showAcDropdown(rect, items) {
    if (!items || items.length === 0) { hideAcDropdown(); return; }
    acItems = items;
    acSelected = 0;
    acVisible = true;
    acDropdown.classList.add('visible');

    // Position relative to editor-wrapper
    const wrapper = document.querySelector('.editor-wrapper');
    const wrapperRect = wrapper.getBoundingClientRect();
    const lineHeight = 20;
    const lines = editor.value.substring(0, editor.selectionStart).split('\n');
    const top = Math.min(lines.length * lineHeight + 8, wrapperRect.height - 220);

    acDropdown.style.left = Math.min(acPrefix ? (acPrefix.length * 8.4 + 16) : 16, 300) + 'px';
    acDropdown.style.top = top + 'px';

    let html = '';
    acItems.forEach((item, i) => {
        html += `<div class="ac-item${i === 0 ? ' selected' : ''}" data-idx="${i}" onmousedown="selectAcItem(${i}, event)">
            <span class="ac-label">${escapeHtml(item.label)}</span>
            <span class="ac-kind ${item.kind}">${item.kind}</span>
            <span class="ac-detail">${escapeHtml(item.detail || '')}</span>
        </div>`;
    });
    acDropdown.innerHTML = html;
}

function hideAcDropdown() {
    acVisible = false;
    acSelected = -1;
    acItems = [];
    acDropdown.classList.remove('visible');
}

function applyCompletion(item) {
    const { prefix, start, end } = getCursorWord();
    const ta = editor;
    let insertText = item.insert;

    // Simple snippet handling: $1, $2 become cursor stops
    const snippetStops = [];
    insertText = insertText.replace(/\$(\d+)/g, (_, n) => {
        snippetStops.push(parseInt(n));
        return '';
    });

    // Replace the current word with the completion
    ta.setRangeText(insertText, start, end, 'end');

    // If there's a $1 stop, move cursor there
    if (item.insert.includes('$1')) {
        const idx = item.insert.indexOf('$1');
        const beforeSnippet = item.insert.substring(0, idx);
        ta.selectionStart = ta.selectionEnd = start + beforeSnippet.length;
    }

    ta.focus();
    hideAcDropdown();
}

function selectAcItem(idx, event) {
    if (event) event.preventDefault();
    if (idx >= 0 && idx < acItems.length) {
        applyCompletion(acItems[idx]);
    }
}

async function triggerAutocomplete() {
    const { prefix } = getCursorWord();

    // Don't trigger on very short prefixes or after numbers
    if (prefix.length < 1) { hideAcDropdown(); return; }

    acPrefix = prefix;

    const ta = editor;
    const pos = ta.selectionStart;
    const text = ta.value;
    const inTypePos = isInTypePosition(text, pos);

    // Client-side: fast completion from keywords + regex-collected names
    let items = [];
    const source = inTypePos ? DEW_TYPES : DEW_KEYWORDS;
    const clientNames = inTypePos ? new Set() : collectClientNames(text);

    for (const item of source) {
        if (item.label.toLowerCase().startsWith(prefix.toLowerCase())) {
            items.push(item);
        }
    }
    for (const name of clientNames) {
        if (name.toLowerCase().startsWith(prefix.toLowerCase()) && !source.some(s => s.label === name)) {
            items.push({ label: name, kind: 'variable', detail: 'user-defined', insert: name });
        }
    }
    // Sort: keywords first, then variables, alphabetically within each
    items.sort((a, b) => {
        if (a.kind !== b.kind) return a.kind === 'keyword' ? -1 : 1;
        return a.label.localeCompare(b.label);
    });

    if (items.length > 0) {
        const rect = editor.getBoundingClientRect();
        showAcDropdown(rect, items);
    } else {
        hideAcDropdown();
    }

    // Server-side: precise completion (async, updates dropdown when ready)
    const cursor = getCursorPosition();
    try {
        const resp = await fetch('/api/complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ source: text, line: cursor.line, column: cursor.column })
        });
        const data = await resp.json();
        if (data.completions && data.completions.length > 0 && acVisible) {
            // Merge server results (they may be more precise)
            const merged = [...items];
            for (const sc of data.completions) {
                if (!merged.some(m => m.label === sc.label)) {
                    merged.push(sc);
                }
            }
            merged.sort((a, b) => {
                const order = { keyword: 0, type: 0, variable: 1 };
                const oa = order[a.kind] ?? 2;
                const ob = order[b.kind] ?? 2;
                return oa - ob || a.label.localeCompare(b.label);
            });
            showAcDropdown(null, merged);
        }
    } catch (_) {
        // Server unavailable — client-side results are already shown
    }
}

function handleAcKeydown(e) {
    if (!acVisible) {
        // Trigger on typing or Ctrl+Space
        if (e.key === ' ' && e.ctrlKey) {
            e.preventDefault();
            triggerAutocomplete();
            return;
        }
        // Debounced trigger after typing alphanumeric
        if (e.key.length === 1 && /[a-zA-Z0-9_]/.test(e.key)) {
            clearTimeout(acDebounceTimer);
            acDebounceTimer = setTimeout(triggerAutocomplete, 150);
        } else if (e.key === 'Backspace' || e.key === 'Delete') {
            clearTimeout(acDebounceTimer);
            acDebounceTimer = setTimeout(triggerAutocomplete, 150);
        }
        return;
    }

    switch (e.key) {
        case 'ArrowDown':
            e.preventDefault();
            acSelected = Math.min(acSelected + 1, acItems.length - 1);
            updateAcSelection();
            break;
        case 'ArrowUp':
            e.preventDefault();
            acSelected = Math.max(acSelected - 1, 0);
            updateAcSelection();
            break;
        case 'Enter':
        case 'Tab':
            e.preventDefault();
            if (acSelected >= 0 && acSelected < acItems.length) {
                applyCompletion(acItems[acSelected]);
            }
            break;
        case 'Escape':
            e.preventDefault();
            hideAcDropdown();
            break;
        default:
            // Keep typing — re-filter
            if (e.key.length === 1 && /[a-zA-Z0-9_]/.test(e.key)) {
                setTimeout(triggerAutocomplete, 50);
            } else if (e.key === 'Backspace') {
                setTimeout(triggerAutocomplete, 50);
            }
    }
}

function updateAcSelection() {
    const items = acDropdown.querySelectorAll('.ac-item');
    items.forEach((el, i) => {
        el.classList.toggle('selected', i === acSelected);
        if (i === acSelected) el.scrollIntoView({ block: 'nearest' });
    });
}

// Hide dropdown when clicking outside
document.addEventListener('click', function(e) {
    if (!acDropdown.contains(e.target) && e.target !== editor) {
        hideAcDropdown();
    }
});
</script>
</body>
</html>
